<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Deals — Enter Invite Code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛷️</text></svg>">
    <style>
        .invite-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .invite-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .invite-card .logo {
            margin: 0 auto 1rem;
            width: 48px;
            height: 48px;
            background: var(--accent-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }
        .invite-card h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem;
            color: var(--text);
        }
        .invite-card p {
            color: var(--muted);
            font-size: 0.9rem;
            margin: 0 0 1.5rem;
        }
        .invite-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .invite-form input[type="text"] {
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            color: var(--text);
            font-size: 1.1rem;
            font-family: 'Inter', monospace;
            text-align: center;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            outline: none;
            transition: border-color var(--transition);
        }
        .invite-form input[type="text"]:focus {
            border-color: var(--accent);
        }
        .invite-form input[type="text"]::placeholder {
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: none;
        }
        .invite-form button {
            background: var(--accent);
            color: #0b0f19;
            border: none;
            border-radius: var(--radius-sm);
            padding: 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity var(--transition);
        }
        .invite-form button:hover {
            opacity: 0.85;
        }
        .error-msg {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="invite-container">
        <div class="invite-card">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 22 16 8"/>
                    <path d="M7.5 19.5 22 5"/>
                    <path d="M10 15l-3 3"/>
                </svg>
            </div>
            <h1>Snow Deals</h1>
            <p>This site is invite-only. Enter your invite code to continue.</p>
            <form class="invite-form" method="post" action="/invite">
                <input type="text" name="code" placeholder="Enter invite code" autocomplete="off" autofocus required>
                <button type="submit">Enter</button>
            </form>
            {% if error %}
            <p class="error-msg">{{ error }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
