{% for d in deals %}
{% include "partials/_card.html" %}
{% endfor %}
{% if has_more %}
<div class="load-more-wrap" style="grid-column: 1 / -1;">
    <button class="load-more-btn"
            hx-get="/deals?offset={{ next_offset }}"
            hx-include=".filters [name],[name='q']"
            hx-swap="outerHTML"
            hx-target="closest .load-more-wrap">
        Load more deals
    </button>
</div>
{% endif %}
