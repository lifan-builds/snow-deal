<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snow-deals aggregator</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>snow-deals</h1>
        <div class="header-row">
            <p class="subtitle">Best ski &amp; snowboard deals across {{ stores|length }} stores</p>
            <a href="/status" class="status-link">Store Status</a>
        </div>
    </header>

    <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
        </svg>
        <input type="text" name="q" placeholder="Search deals..."
               value="{{ current_q or '' }}"
               hx-get="/deals"
               hx-target="#deal-grid"
               hx-include=".filters [name]"
               hx-trigger="keyup changed delay:400ms">
    </div>

    <nav class="filters">
        <div class="filter-group">
            <label>Category</label>
            <select name="category"
                    hx-get="/deals"
                    hx-target="#deal-grid"
                    hx-include=".filters [name],[name='q']">
                <option value="">All</option>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if cat == current_category %}selected{% endif %}>
                    {{ cat|title }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-group">
            <label>Store</label>
            <select name="store"
                    hx-get="/deals"
                    hx-target="#deal-grid"
                    hx-include=".filters [name],[name='q']">
                <option value="">All stores</option>
                {% for s in stores %}
                <option value="{{ s }}" {% if s == current_store %}selected{% endif %}>
                    {{ s }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-group">
            <label>Sort by</label>
            <select name="sort"
                    hx-get="/deals"
                    hx-target="#deal-grid"
                    hx-include=".filters [name],[name='q']">
                <option value="discount_pct" {% if current_sort == 'discount_pct' %}selected{% endif %}>Biggest discount</option>
                <option value="price_low" {% if current_sort == 'price_low' %}selected{% endif %}>Price: low to high</option>
                <option value="price_high" {% if current_sort == 'price_high' %}selected{% endif %}>Price: high to low</option>
                <option value="store" {% if current_sort == 'store' %}selected{% endif %}>Store</option>
                <option value="newest" {% if current_sort == 'newest' %}selected{% endif %}>Newest</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Min discount: <span id="discount-val">{{ current_min_discount|int }}%</span></label>
            <input type="range" name="min_discount" min="0" max="80" step="5"
                   value="{{ current_min_discount|int }}"
                   hx-get="/deals"
                   hx-target="#deal-grid"
                   hx-include=".filters [name],[name='q']"
                   hx-trigger="change"
                   oninput="document.getElementById('discount-val').textContent = this.value + '%'">
        </div>

        <div class="filter-group">
            <label class="toggle-label">
                <input type="checkbox" name="tax_free" value="1"
                       {% if current_tax_free == '1' %}checked{% endif %}
                       hx-get="/deals"
                       hx-target="#deal-grid"
                       hx-include=".filters [name],[name='q']">
                <span class="toggle-text">Tax Free Only</span>
            </label>
        </div>
    </nav>

    <div class="result-count">{{ deal_count }} deals found</div>

    <main id="deal-grid" class="htmx-settle">
        {% include "partials/deal_cards.html" %}
    </main>

    <script>
    /* ---- Analytics tracker ---- */
    (function() {
        function trackEvent(data) {
            fetch('/api/event', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            }).catch(function() {});
        }

        // Track page view
        trackEvent({event_type: 'page_view'});

        // Track deal clicks
        function attachClickTrackers() {
            document.querySelectorAll('.deal-card[data-store]').forEach(function(card) {
                if (card._tracked) return;
                card._tracked = true;
                card.addEventListener('click', function() {
                    trackEvent({
                        event_type: 'click',
                        deal_url: card.getAttribute('href'),
                        deal_name: card.dataset.dealName,
                        store: card.dataset.store,
                        category: card.dataset.category || null,
                    });
                });
            });
        }
        attachClickTrackers();

        // Track filter changes
        document.querySelectorAll('.filters select, .filters input').forEach(function(el) {
            el.addEventListener('change', function() {
                var label = el.name;
                var val = el.type === 'checkbox' ? (el.checked ? '1' : '0') : el.value;
                trackEvent({
                    event_type: 'filter',
                    metadata: label + '=' + val,
                });
            });
        });

        // Track search
        var searchInput = document.querySelector('input[name="q"]');
        if (searchInput) {
            var searchTimer;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimer);
                var q = searchInput.value;
                searchTimer = setTimeout(function() {
                    if (q.length >= 2) {
                        trackEvent({event_type: 'search', metadata: q});
                    }
                }, 1000);
            });
        }

        // Re-attach click trackers after HTMX swaps
        document.body.addEventListener('htmx:afterSwap', function() {
            attachClickTrackers();
        });
    })();
    </script>
</body>
</html>
