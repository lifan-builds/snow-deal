name: Scrape Deals

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          cd aggregator && pip install -e .

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: snow-deals-agg -v refresh --max-pages 25

      - name: Fetch reviews
        run: snow-deals-agg fetch-reviews

      - name: Upload deals.db as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if it exists (ignore errors)
          gh release delete latest-data --yes 2>/dev/null || true
          # Delete the tag too so we get a fresh timestamp
          git push origin :refs/tags/latest-data 2>/dev/null || true
          # Create new release with deals.db
          gh release create latest-data \
            aggregator/deals.db \
            --title "Latest Deals Data" \
            --notes "Auto-generated by scrape workflow at $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest=false

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -s "$RENDER_DEPLOY_HOOK_URL"
